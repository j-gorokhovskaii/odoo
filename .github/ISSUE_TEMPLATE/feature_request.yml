name: "✨ Feature request"
description: Propose a new feature or enhancement for a custom module
title: "feat: <short summary>"
labels: ["type:feature", "status:triage"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module / area
      options:
        - opensource_knowledge
        - odoo_documentation
        - partner_dob
        - partner_height
        - company_details
        - extendedcontact
        - web_dark_mode
        - theme_backend_blue
        - new module
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to achieve? Why does the current behaviour fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How will we know this is complete?
      value: |
        - [ ]
        - [ ] CI green
        - [ ] CHANGELOG updated
    validations:
      required: false
